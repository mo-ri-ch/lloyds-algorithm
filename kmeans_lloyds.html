<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lloyd's Algorithm — K-Means Clustering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2128;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.16);
  --text: #e8e6e0;
  --muted: #8a887e;
  --accent: #c8a96e;
  --accent2: #e8c98a;
  --c2: #5ec47a;
  --sans: 'Instrument Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', Georgia, serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
}

/* subtle grid bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;
  z-index:0;
}

.app {
  position: relative; z-index:1;
  display: grid;
  grid-template-rows: 56px 1fr;
  grid-template-columns: 1fr 380px;
  height: 100vh;
  gap: 0;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  grid-column: 1 / -1;
  grid-row: 1;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(14,15,17,0.9);
  backdrop-filter: blur(8px);
}
.hd-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  white-space: nowrap;
}
.hd-title em { font-style: italic; color: var(--accent2); }
.hd-sep { width:1px; height:22px; background:var(--border2); }
.hd-tag {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 5px;
  padding: 3px 10px;
}

/* toolbar controls in header */
.toolbar { display:flex; align-items:center; gap:12px; margin-left:auto; flex-wrap:nowrap; }
.ctrl-group { display:flex; align-items:center; gap:7px; }
.ctrl-label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
}
input[type=range] {
  -webkit-appearance:none;
  width:72px; height:4px;
  background:var(--border2);
  border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:14px; height:14px;
  border-radius:50%;
  background:var(--accent);
  border:2px solid var(--bg);
  cursor:pointer;
}
.val-badge {
  font-family:var(--mono);
  font-size:13px;
  color:var(--accent);
  min-width:20px;
  text-align:center;
}
.speed-btns { display:flex; gap:3px; }
.speed-btn {
  font-family:var(--mono);
  font-size:11px;
  padding:3px 7px;
  border-radius:4px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all .15s;
}
.speed-btn.active { background:var(--surface2); color:var(--text); border-color:rgba(255,255,255,.25); }
.btn {
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--sans);
  font-size:13px;
  padding:6px 14px;
  border-radius:7px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  transition:background .15s;
  white-space:nowrap;
}
.btn:hover { background:var(--surface2); }
.btn:active { transform:scale(.97); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#0e0f11; font-weight:600; }
.btn.primary:hover { background:var(--accent2); border-color:var(--accent2); }

/* ── CANVAS AREA (left column, row 2) ───────────── */
.canvas-area {
  grid-column: 1;
  grid-row: 2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
svg#canvas {
  display:block;
  flex: 1 1 0;
  width:100%;
  background: var(--bg);
}
.canvas-footer {
  display:flex; gap:18px; flex-wrap:wrap;
  padding: 8px 18px;
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
  justify-content: space-between;
  align-items: center;
}
.legend-item {
  display:flex; align-items:center; gap:7px;
  font-family:var(--mono);
  font-size:13px;
  color:var(--muted);
}
.legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

/* ── RIGHT PANEL (col 2, row 2) ─────────────────── */
.panel {
  grid-column: 2;
  grid-row: 2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}

/* each section in the panel */
.pane {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.pane-hd {
  display:flex; align-items:center; gap:8px;
  padding: 7px 16px;
  border-bottom: 1px solid var(--border);
}
.pane-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.pane-title {
  font-family:var(--mono);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--muted);
}
.pane-body { padding:8px 16px; }

/* metrics */
.metrics-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.metric { background:var(--surface2); border-radius:8px; padding:8px 12px; }
.metric-label { font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.metric-value { font-family:var(--mono); font-size:20px; color:var(--text); font-weight:500; }
.metric-value.ok { color:var(--c2); }

/* convergence banner */
#convergeBanner {
  display:none;
  margin:0 0 8px;
  background:rgba(94,196,122,.1);
  border:1px solid rgba(94,196,122,.3);
  border-radius:8px;
  padding:7px 12px;
  font-size:13px;
  color:var(--c2);
  font-family:var(--mono);
}
#convergeBanner.show { display:block; }

/* math panel — fixed, no scroll */
.math-pane { flex-shrink:0; border-bottom:1px solid var(--border); }
#mathPanel {
  padding: 10px 16px 12px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--muted);
}
#mathPanel .phase-label {
  font-family:var(--mono);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--accent);
  margin-bottom:5px;
}
#mathPanel p { margin:3px 0; color:var(--muted); font-size:14px; }
#mathPanel strong { color:var(--text); font-weight:500; }
#mathPanel .math-block {
  background:var(--surface2);
  border-left:2px solid var(--accent);
  border-radius:6px;
  padding:6px 12px;
  margin:6px 0;
  font-family:var(--mono);
  font-size:14px;
  color:var(--text);
}

/* phase pills */
.phase-pills {
  display:flex; gap:5px; flex-wrap:wrap;
  padding:7px 16px;
  border-bottom:1px solid var(--border);
}
.pill {
  font-family:var(--mono);
  font-size:12px;
  padding:3px 10px;
  border-radius:20px;
  border:1px solid var(--border2);
  color:var(--muted);
  cursor:default;
  transition:all .2s;
}
.pill.active {
  background:var(--accent);
  border-color:var(--accent);
  color:#0e0f11;
  font-weight:600;
}

/* centroid table */
.ctable { width:100%; border-collapse:collapse; }
.ctable th {
  font-family:var(--mono);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--muted);
  text-align:left;
  padding:5px 10px 8px;
  border-bottom:1px solid var(--border);
}
.ctable td {
  padding:5px 10px;
  border-bottom:1px solid var(--border);
  font-family:var(--mono);
  font-size:13px;
  color:var(--text);
}
.ctable tr:last-child td { border-bottom:none; }
.cswatch { width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:5px; vertical-align:middle; }

/* step log */
.log-scroll {
  max-height:88px;
  overflow-y:auto;
  padding:7px 12px;
  display:flex; flex-direction:column; gap:4px;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.log-entry {
  background:var(--surface2);
  border-radius:7px;
  padding:5px 9px;
  font-size:13px;
  line-height:1.5;
  border-left:2px solid var(--border2);
  color:var(--text);
  animation:fi .2s ease;
}
.log-entry.assign { border-left-color:#5b9cf6; }
.log-entry.update { border-left-color:var(--accent); }
.log-entry.converged { border-left-color:var(--c2); }
.log-entry.reset { border-left-color:var(--border2); color:var(--muted); }
@keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.footer-credit {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.footer-credit .social-link {
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color .15s ease;
}
.footer-credit .social-link:hover {
  color: var(--accent);
}
.footer-credit .sep {
  color: var(--border2);
}
.footer-credit .heart {
  color: #ff4d4d;
  display: inline-block;
  animation: beat .6s infinite alternate;
  transform-origin: center;
}
.footer-credit svg {
  width: 12px;
  height: 12px;
  fill: currentColor;
}
@keyframes beat {
  to { transform: scale(1.18); }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="hd-title">Lloyd's Algorithm for <em>K-Means</em></div>
    <div class="hd-sep"></div>
    <div class="hd-tag">Unsupervised Learning</div>
    <div class="hd-sep"></div>

    <div class="toolbar">
      <div class="ctrl-group">
        <label class="ctrl-label" for="kSlider">K</label>
        <input type="range" id="kSlider" min="2" max="6" value="3" step="1">
        <span class="val-badge" id="kVal">3</span>
      </div>
      <div class="hd-sep"></div>
      <div class="ctrl-group">
        <label class="ctrl-label" for="nSlider">Points</label>
        <input type="range" id="nSlider" min="20" max="120" value="60" step="10">
        <span class="val-badge" id="nVal">60</span>
      </div>
      <div class="hd-sep"></div>
      <div class="ctrl-group">
        <span class="ctrl-label">Speed</span>
        <div class="speed-btns">
          <button class="speed-btn" data-ms="800">slow</button>
          <button class="speed-btn active" data-ms="420">1×</button>
          <button class="speed-btn" data-ms="140">fast</button>
        </div>
      </div>
      <div class="hd-sep"></div>
      <button class="btn" id="newDatasetBtn">✦ New Dataset</button>
      <button class="btn" id="resetBtn">↺ Reset</button>
      <button class="btn" id="backBtn" disabled>◀ Prev</button>
      <button class="btn" id="stepBtn">▶ Step</button>
      <button class="btn primary" id="runBtn">⚡ Run all</button>
    </div>
  </header>

  <!-- CANVAS -->
  <div class="canvas-area">
    <svg id="canvas" viewBox="0 0 760 520" preserveAspectRatio="xMidYMid meet"
         role="img" aria-label="K-means clustering visualization"></svg>
    <div class="canvas-footer">
      <div id="legendBar"></div>
      <div class="footer-credit">
        <span>Made with <span class="heart">♥</span> by Rishal</span>
        <span class="sep">|</span>
        <a href="https://www.linkedin.com/in/morich/" target="_blank" class="social-link">
          <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          LinkedIn
        </a>
        <span class="sep">|</span>
        <a href="https://www.instagram.com/datawithrizz" target="_blank" class="social-link">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">

    <!-- Metrics -->
    <div class="pane">
      <div class="pane-hd"><div class="pane-dot"></div><span class="pane-title">Metrics</span></div>
      <div class="pane-body">
        <div id="convergeBanner">✓ Converged — reset to try a new configuration.</div>
        <div class="metrics-grid">
          <div class="metric"><div class="metric-label">Iteration</div><div class="metric-value" id="mIter">0</div></div>
          <div class="metric"><div class="metric-label">WCSS</div><div class="metric-value" id="mWcss">—</div></div>
          <div class="metric"><div class="metric-label">Status</div><div class="metric-value" id="mStatus">Ready</div></div>
        </div>
      </div>
    </div>

    <!-- Phase pills + math -->
    <div class="phase-pills" id="phaseNav">
      <span class="pill active" id="pill-init">Init</span>
      <span class="pill" id="pill-assign">Assign</span>
      <span class="pill" id="pill-update">Update</span>
      <span class="pill" id="pill-converge">Converge</span>
    </div>
    <div class="math-pane">
      <div id="mathPanel"></div>
    </div>

    <!-- Centroid table -->
    <div class="pane">
      <div class="pane-hd"><div class="pane-dot"></div><span class="pane-title">Centroids</span></div>
      <div style="padding:0 0 4px;">
        <table class="ctable">
          <thead><tr><th>Cluster</th><th>x̄</th><th>ȳ</th><th>Size</th></tr></thead>
          <tbody id="centroidTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Step log -->
    <div class="pane" style="border-bottom:none;">
      <div class="pane-hd"><div class="pane-dot"></div><span class="pane-title">Step Log</span></div>
      <div class="log-scroll" id="stepLog"></div>
    </div>

  </div><!-- /panel -->
</div><!-- /app -->

<script>
const COLORS   = ['#5b9cf6','#e07b54','#5ec47a','#d4a843','#b07bca','#5bc4c4'];
const COLORS_L = ['rgba(91,156,246,.13)','rgba(224,123,84,.13)','rgba(94,196,122,.13)',
                  'rgba(212,168,67,.13)','rgba(176,123,202,.13)','rgba(91,196,196,.13)'];
const W=760, H=520, PAD=40;
const ns='http://www.w3.org/2000/svg';

let K=3, N=60, points=[], centroids=[], assignment=[], iteration=0, converged=false, animTimer=null, speed=420, phase='init', history=[];

const svg=document.getElementById('canvas');

function el(tag,attrs,text){
  const e=document.createElementNS(ns,tag);
  for(const[k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  if(text!==undefined) e.textContent=text;
  return e;
}
function rng(a,b){return a+Math.random()*(b-a);}

function makePoints(){
  points=[];
  const cx=[],cy=[];
  let tries=0;
  while(cx.length<K&&tries<600){
    const x=rng(PAD+90,W-PAD-90), y=rng(PAD+70,H-PAD-70);
    if(!cx.some((_,i)=>Math.hypot(x-cx[i],y-cy[i])<120)){cx.push(x);cy.push(y);}
    tries++;
  }
  while(cx.length<K){cx.push(rng(PAD+60,W-PAD-60));cy.push(rng(PAD+50,H-PAD-50));}
  const spread=Math.min(55,(Math.min(W,H)-2*PAD)/(K*1.5));
  for(let i=0;i<N;i++){
    const c=Math.floor(Math.random()*K);
    const u=1-Math.random(),v=Math.random();
    const g1=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
    const g2=Math.sqrt(-2*Math.log(u))*Math.sin(2*Math.PI*v);
    points.push({
      x:Math.max(PAD+4,Math.min(W-PAD-4,cx[c]+g1*spread)),
      y:Math.max(PAD+4,Math.min(H-PAD-4,cy[c]+g2*spread))
    });
  }
}

function initCentroids(){
  const idxs=[];
  while(idxs.length<K){const r=Math.floor(Math.random()*N);if(!idxs.includes(r))idxs.push(r);}
  centroids=idxs.map(i=>({x:points[i].x,y:points[i].y}));
  assignment=new Array(N).fill(-1);
}

function assign(){
  let changed=false;
  for(let i=0;i<N;i++){
    let best=-1,bestD=Infinity;
    for(let k=0;k<K;k++){
      const d=(points[i].x-centroids[k].x)**2+(points[i].y-centroids[k].y)**2;
      if(d<bestD){bestD=d;best=k;}
    }
    if(assignment[i]!==best){changed=true;assignment[i]=best;}
  }
  return changed;
}

function updateCentroids(){
  const prev=centroids.map(c=>({x:c.x,y:c.y}));
  for(let k=0;k<K;k++){
    const pts=points.filter((_,i)=>assignment[i]===k);
    if(!pts.length) continue;
    centroids[k].x=pts.reduce((s,p)=>s+p.x,0)/pts.length;
    centroids[k].y=pts.reduce((s,p)=>s+p.y,0)/pts.length;
  }
  return prev.every((p,k)=>Math.hypot(p.x-centroids[k].x,p.y-centroids[k].y)<0.01);
}

function wcss(){
  return points.reduce((s,p,i)=>{
    const k=assignment[i];if(k<0)return s;
    return s+(p.x-centroids[k].x)**2+(p.y-centroids[k].y)**2;
  },0);
}

function draw(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);

  // membership lines
  for(let k=0;k<K;k++){
    points.filter((_,i)=>assignment[i]===k).forEach(p=>{
      svg.appendChild(el('line',{x1:centroids[k].x,y1:centroids[k].y,x2:p.x,y2:p.y,
        stroke:COLORS[k],'stroke-width':'0.7','stroke-opacity':'0.14'}));
    });
  }

  // data points
  points.forEach((p,i)=>{
    const k=assignment[i];
    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:'4',
      fill:k>=0?COLORS_L[k]:'rgba(120,120,120,.08)',
      stroke:k>=0?COLORS[k]:'rgba(160,160,160,.4)',
      'stroke-width':k>=0?'1.3':'0.8'}));
  });

  // centroids — diamond
  centroids.forEach((c,k)=>{
    const s=11;
    svg.appendChild(el('circle',{cx:c.x,cy:c.y,r:'18',fill:COLORS_L[k],stroke:'none'}));
    svg.appendChild(el('path',{
      d:`M${c.x} ${c.y-s} L${c.x+s} ${c.y} L${c.x} ${c.y+s} L${c.x-s} ${c.y} Z`,
      fill:COLORS[k],stroke:'#0e0f11','stroke-width':'2'}));
    const lbl=el('text',{x:c.x+17,y:c.y-11,'font-size':'14','fill':COLORS[k],'font-family':'DM Mono,monospace','font-weight':'500'});
    lbl.textContent=`C${k+1}`;
    svg.appendChild(lbl);
  });

  updateLegend();
  updateTable();
  updateMetrics();
  document.getElementById('backBtn').disabled = (history.length === 0);
}

function updateLegend(){
  const bar=document.getElementById('legendBar');
  bar.innerHTML='';
  for(let k=0;k<K;k++){
    const cnt=assignment.filter(a=>a===k).length;
    const d=document.createElement('div');
    d.className='legend-item';
    d.innerHTML=`<span class="legend-dot" style="background:${COLORS[k]}"></span>Cluster ${k+1} — ${cnt} pts`;
    bar.appendChild(d);
  }
}

function updateTable(){
  const tb=document.getElementById('centroidTable');
  tb.innerHTML='';
  centroids.forEach((c,k)=>{
    const cnt=assignment.filter(a=>a===k).length;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="cswatch" style="background:${COLORS[k]}"></span>C${k+1}</td><td>${c.x.toFixed(1)}</td><td>${c.y.toFixed(1)}</td><td>${cnt}</td>`;
    tb.appendChild(tr);
  });
}

function updateMetrics(){
  document.getElementById('mIter').textContent=iteration;
  const w=wcss();
  document.getElementById('mWcss').textContent=w>0?Math.round(w).toLocaleString():'—';
  const s=document.getElementById('mStatus');
  if(converged){s.textContent='Done';s.className='metric-value ok';}
  else if(iteration===0){s.textContent='Ready';s.className='metric-value';}
  else{s.textContent='Running';s.className='metric-value';}
}

function setPhase(p){
  phase=p;
  ['init','assign','update','converge'].forEach(id=>{
    document.getElementById('pill-'+id).className='pill'+(id===p?' active':'');
  });
  document.getElementById('mathPanel').innerHTML=MATH[p]||'';
}

const MATH={
  init:`<p class="phase-label">Initialization — Forgy method</p>
    <p>Sample <strong>K</strong> random data points as starting centroids <strong>(◆ diamonds)</strong>:</p>
    <div class="math-block">μ₁, μ₂, …, μₖ  ←  random sample from X</div>
    <p>Each <strong>μⱼ ∈ ℝ²</strong>. Initial placement affects the result — reset and keep the lowest WCSS.</p>`,
  assign:`<p class="phase-label">E-step — Assignment</p>
    <p>Assign each point <strong>xᵢ</strong> to the nearest centroid (squared Euclidean distance):</p>
    <div class="math-block">C(i) = argmin<sub>j</sub>  ‖xᵢ − μⱼ‖²</div>
    <p>Splits space into <strong>K Voronoi regions</strong>. Boundary between j and l: <strong>‖x−μⱼ‖² = ‖x−μₗ‖²</strong>. Cost: <strong>O(n·k)</strong>.</p>`,
  update:`<p class="phase-label">M-step — Centroid update</p>
    <p>Move each centroid to the <strong>mean</strong> of its assigned points <strong>Sⱼ</strong>:</p>
    <div class="math-block">μⱼ ← (1/|Sⱼ|) · Σ<sub>xᵢ∈Sⱼ</sub> xᵢ</div>
    <p>Minimises <strong>WCSS = Σⱼ Σ<sub>xᵢ∈Sⱼ</sub> ‖xᵢ−μⱼ‖²</strong>. Each step can only decrease WCSS (coordinate descent).</p>`,
  converge:`<p class="phase-label">Convergence</p>
    <p>Stop when centroids no longer move significantly:</p>
    <div class="math-block">‖μⱼ<sup>(t)</sup> − μⱼ<sup>(t−1)</sup>‖ &lt; ε  ∀j  →  WCSS<sup>(t+1)</sup> ≤ WCSS<sup>(t)</sup></div>
    <p>Convergence is <strong>guaranteed</strong> (finite partitions, monotone WCSS). Result may be a <strong>local minimum</strong> — use K-means++ or multiple restarts.</p>`
};

function addLog(msg,cls=''){
  const div=document.getElementById('stepLog');
  const e=document.createElement('div');
  e.className='log-entry'+(cls?' '+cls:'');
  e.textContent=msg;
  div.insertBefore(e,div.firstChild);
  while(div.children.length>25)div.removeChild(div.lastChild);
}

function stepOnce(){
  if(converged){addLog('Already converged. Reset to continue.','reset');return;}
  history.push(getSnapshot());
  if(iteration===0){
    assign(); iteration=1;
    setPhase('assign'); draw();
    addLog(`Iter 1 — assigned ${N} points to nearest centroid.`,'assign');
    return;
  }
  const conv=updateCentroids();
  const changed=assign();
  iteration++;
  if(conv||!changed){
    converged=true;
    setPhase('converge'); draw();
    addLog(`✓ Converged after ${iteration} iterations. WCSS = ${Math.round(wcss()).toLocaleString()}`,'converged');
    document.getElementById('convergeBanner').classList.add('show');
  } else {
    setPhase(iteration%2===0?'update':'assign'); draw();
    addLog(`Iter ${iteration} — centroids updated, points reassigned. WCSS = ${Math.round(wcss()).toLocaleString()}`,iteration%2===0?'update':'assign');
  }
}

function runAll(){
  if(animTimer){clearTimeout(animTimer);animTimer=null;}
  function tick(){if(converged)return;stepOnce();if(!converged)animTimer=setTimeout(tick,speed);}
  tick();
}

function getSnapshot(){
  return {
    centroids: centroids.map(c=>({x:c.x,y:c.y})),
    assignment: [...assignment],
    iteration: iteration,
    converged: converged,
    phase: phase,
    logHTML: document.getElementById('stepLog').innerHTML
  };
}

function stepBack(){
  if(animTimer){clearTimeout(animTimer);animTimer=null;}
  if(history.length===0) return;
  const prev=history.pop();
  centroids=prev.centroids;
  assignment=prev.assignment;
  iteration=prev.iteration;
  converged=prev.converged;
  setPhase(prev.phase);
  document.getElementById('stepLog').innerHTML=prev.logHTML;
  if(!converged){
    document.getElementById('convergeBanner').classList.remove('show');
  } else {
    document.getElementById('convergeBanner').classList.add('show');
  }
  draw();
}

function reset(keepDataset = false){
  if(animTimer){clearTimeout(animTimer);animTimer=null;}
  history = [];
  iteration=0;converged=false;
  K=parseInt(document.getElementById('kSlider').value);
  N=parseInt(document.getElementById('nSlider').value);
  
  let regenerated = false;
  if (!keepDataset || points.length !== N) {
    makePoints();
    regenerated = true;
  }
  
  initCentroids();
  setPhase('init');draw();
  document.getElementById('convergeBanner').classList.remove('show');
  
  if (regenerated) {
    addLog(`Reset — K=${K}, ${N} points generated.`,'reset');
  } else {
    addLog(`Reset centroids — kept existing ${N} points.`,'reset');
  }
}

document.getElementById('kSlider').addEventListener('input',e=>{document.getElementById('kVal').textContent=e.target.value;reset(false);});
document.getElementById('nSlider').addEventListener('input',e=>{document.getElementById('nVal').textContent=e.target.value;reset(false);});
document.getElementById('newDatasetBtn').addEventListener('click',()=>reset(false));
document.getElementById('resetBtn').addEventListener('click',()=>reset(true));
document.getElementById('backBtn').addEventListener('click',stepBack);
document.getElementById('stepBtn').addEventListener('click',stepOnce);
document.getElementById('runBtn').addEventListener('click',runAll);
document.querySelectorAll('.speed-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); speed=parseInt(b.dataset.ms);
  });
});

reset();
</script>
</body>
</html>
